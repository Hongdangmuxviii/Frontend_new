<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="920" viewBox="0 0 1440 920">
  <defs>
    <style>
      .bg{fill:#dfe8ff}
      .panel{fill:#eef3ff;stroke:#c9d6f2;stroke-width:1.5}
      .title{font-family:Arial, sans-serif;font-size:34px;font-weight:800;fill:#001b3d}
      .subtitle{font-family:Arial, sans-serif;font-size:15px;fill:#64748b}
      .h{font-family:Arial, sans-serif;font-size:16px;font-weight:800;fill:#001b3d}
      .label{font-family:Arial, sans-serif;font-size:13px;font-weight:700;fill:#64748b}
      .small{font-family:Arial, sans-serif;font-size:12px;fill:#64748b}
      .code{font-family:Consolas, monospace;font-size:13px;font-weight:700;fill:#0f172a}
      .buttonText{font-family:Arial, sans-serif;font-size:14px;font-weight:800}
      .aa{font-family:Georgia, 'Times New Roman', serif;font-size:136px;fill:#0f172a}
      .aaSans{font-family:Arial, sans-serif;font-size:126px;font-weight:800;fill:#0f172a}
      .chipText{font-family:Arial, sans-serif;font-size:13px;font-weight:800}
      .shadow{filter:url(#softShadow)}
    </style>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#001b3d" flood-opacity=".08"/>
    </filter>
    <linearGradient id="primaryRamp" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#001b3d"/>
      <stop offset=".2" stop-color="#1e40af"/>
      <stop offset=".4" stop-color="#1d4ed8"/>
      <stop offset=".6" stop-color="#2563eb"/>
      <stop offset=".78" stop-color="#93c5fd"/>
      <stop offset="1" stop-color="#eff6ff"/>
    </linearGradient>
    <linearGradient id="neutralRamp" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset=".22" stop-color="#111827"/>
      <stop offset=".45" stop-color="#64748b"/>
      <stop offset=".66" stop-color="#94a3b8"/>
      <stop offset=".84" stop-color="#e2e8f0"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
  </defs>

  <rect class="bg" width="1440" height="920"/>
  <rect x="22" y="22" width="1396" height="876" rx="28" fill="#eaf0ff" stroke="#2563eb" stroke-width="3"/>
  <text class="title" x="58" y="78">Fontify Design System</text>
  <text class="subtitle" x="58" y="106">A compact visual reference for color, type, controls, and UI states</text>

  <!-- Color system -->
  <rect class="panel shadow" x="54" y="140" width="324" height="610" rx="22"/>
  <text class="h" x="82" y="178">Color Palette</text>
  <text class="small" x="82" y="202">Use tokens from globals.css</text>

  <rect x="82" y="232" width="268" height="132" rx="18" fill="#2563eb"/>
  <text class="buttonText" x="106" y="266" fill="#ffffff">Primary</text>
  <text class="code" x="254" y="266" fill="#ffffff">#2563EB</text>
  <rect x="82" y="330" width="268" height="34" rx="0" fill="url(#primaryRamp)"/>
  <rect x="82" y="330" width="28" height="34" rx="0" fill="#001b3d"/>
  <rect x="322" y="330" width="28" height="34" rx="0" fill="#eff6ff"/>

  <rect x="82" y="392" width="268" height="132" rx="18" fill="#001b3d"/>
  <text class="buttonText" x="106" y="426" fill="#ffffff">Brand Text</text>
  <text class="code" x="254" y="426" fill="#ffffff">#001B3D</text>
  <rect x="82" y="490" width="268" height="34" rx="0" fill="url(#neutralRamp)"/>
  <rect x="82" y="490" width="28" height="34" fill="#0f172a"/>
  <rect x="322" y="490" width="28" height="34" fill="#ffffff"/>

  <rect x="82" y="552" width="268" height="60" rx="16" fill="#eff6ff" stroke="#dbeafe"/>
  <text class="buttonText" x="106" y="588" fill="#2563eb">Primary Soft</text>
  <text class="code" x="254" y="588" fill="#2563eb">#EFF6FF</text>

  <rect x="82" y="630" width="126" height="74" rx="16" fill="#dc2626"/>
  <text class="buttonText" x="106" y="664" fill="#ffffff">Danger</text>
  <text class="code" x="106" y="686" fill="#ffffff">#DC2626</text>
  <rect x="224" y="630" width="126" height="74" rx="16" fill="#10b981"/>
  <text class="buttonText" x="248" y="664" fill="#ffffff">Success</text>
  <text class="code" x="248" y="686" fill="#ffffff">#10B981</text>

  <!-- Typography -->
  <rect class="panel shadow" x="410" y="140" width="318" height="278" rx="22"/>
  <text class="label" x="438" y="178">Headline</text>
  <text class="small" x="624" y="178">Brand / Hero</text>
  <text class="aa" x="492" y="352">Aa</text>
  <text class="small" x="438" y="384">Color: --color-text-brand</text>

  <rect class="panel shadow" x="410" y="448" width="318" height="302" rx="22"/>
  <text class="label" x="438" y="486">Body</text>
  <text class="small" x="644" y="486">Pretendard</text>
  <text class="aaSans" x="492" y="654">Aa</text>
  <text class="small" x="438" y="704">Muted copy uses --color-text-muted</text>

  <!-- Buttons -->
  <rect class="panel shadow" x="760" y="140" width="304" height="278" rx="22"/>
  <text class="h" x="788" y="178">Buttons</text>
  <rect x="788" y="220" width="132" height="44" rx="6" fill="#2563eb"/>
  <text class="buttonText" x="827" y="248" fill="#ffffff">Primary</text>
  <rect x="936" y="220" width="100" height="44" rx="6" fill="#e8eefc"/>
  <text class="buttonText" x="952" y="248" fill="#001b3d">Secondary</text>
  <rect x="788" y="282" width="132" height="44" rx="6" fill="#0f172a"/>
  <text class="buttonText" x="828" y="310" fill="#ffffff">Inverted</text>
  <rect x="936" y="282" width="100" height="44" rx="6" fill="none" stroke="#64748b" stroke-width="1.5"/>
  <text class="buttonText" x="954" y="310" fill="#001b3d">Outlined</text>
  <rect x="788" y="350" width="248" height="18" rx="9" fill="#dbeafe"/>
  <rect x="788" y="350" width="174" height="18" rx="9" fill="#2563eb"/>

  <!-- Inputs -->
  <rect class="panel shadow" x="1096" y="140" width="286" height="278" rx="22"/>
  <text class="h" x="1124" y="178">Inputs</text>
  <rect x="1124" y="232" width="230" height="54" rx="6" fill="#e8eefc" stroke="#94a3b8"/>
  <circle cx="1150" cy="259" r="7" fill="none" stroke="#64748b" stroke-width="2"/>
  <path d="M1156 265 L1164 273" stroke="#64748b" stroke-width="2" stroke-linecap="round"/>
  <text class="small" x="1184" y="265" style="font-size:17px;fill:#334155">Search</text>
  <rect x="1124" y="322" width="230" height="16" rx="8" fill="#dbeafe"/>
  <rect x="1124" y="322" width="92" height="16" rx="8" fill="#2563eb"/>
  <text class="small" x="1124" y="368">Focus ring: --color-primary-ring</text>

  <!-- Components -->
  <rect class="panel shadow" x="760" y="448" width="304" height="302" rx="22"/>
  <text class="h" x="788" y="486">Components</text>
  <rect x="788" y="532" width="248" height="86" rx="18" fill="#ffffff" stroke="#e2e8f0"/>
  <rect x="812" y="556" width="48" height="38" rx="6" fill="#2563eb"/>
  <path d="M827 575 L840 562 L850 572 L837 585 L826 586 Z" fill="#ffffff"/>
  <text class="buttonText" x="884" y="582" fill="#001b3d">Icon + Label</text>

  <rect x="788" y="648" width="248" height="54" rx="27" fill="#e8eefc"/>
  <circle cx="844" cy="675" r="22" fill="#2563eb"/>
  <path d="M836 676 L844 668 L852 676 M839 675 V684 H849 V675" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="912" cy="675" r="22" fill="#ffffff"/>
  <circle cx="912" cy="675" r="7" fill="none" stroke="#001b3d" stroke-width="2"/>
  <path d="M918 681 L925 688" stroke="#001b3d" stroke-width="2" stroke-linecap="round"/>
  <circle cx="980" cy="675" r="22" fill="#ffffff"/>
  <path d="M972 681 C974 674 986 674 988 681 M976 668 A4 4 0 1 0 984 668 A4 4 0 1 0 976 668" fill="none" stroke="#001b3d" stroke-width="2" stroke-linecap="round"/>

  <!-- Chips and status -->
  <rect class="panel shadow" x="1096" y="448" width="286" height="302" rx="22"/>
  <text class="h" x="1124" y="486">States</text>
  <rect x="1124" y="532" width="112" height="38" rx="19" fill="#eff6ff" stroke="#dbeafe"/>
  <text class="chipText" x="1150" y="556" fill="#2563eb">Active</text>
  <rect x="1248" y="532" width="106" height="38" rx="19" fill="#f1f5f9" stroke="#e2e8f0"/>
  <text class="chipText" x="1274" y="556" fill="#64748b">Muted</text>

  <circle cx="1148" cy="632" r="24" fill="#2563eb"/>
  <text x="1148" y="640" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="800" fill="#ffffff">✓</text>
  <circle cx="1212" cy="632" r="24" fill="#dc2626"/>
  <text x="1212" y="640" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="800" fill="#ffffff">!</text>
  <circle cx="1276" cy="632" r="24" fill="#10b981"/>
  <text x="1276" y="640" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="800" fill="#ffffff">↑</text>

  <rect x="1124" y="690" width="230" height="12" rx="6" fill="#e2e8f0"/>
  <rect x="1124" y="690" width="154" height="12" rx="6" fill="#2563eb"/>
  <text class="small" x="1124" y="724">Progress and selected states use Primary</text>

  <!-- Footer swatches -->
  <rect class="panel shadow" x="54" y="790" width="1328" height="70" rx="18"/>
  <text class="label" x="82" y="832">Token order</text>
  <rect x="196" y="812" width="72" height="26" rx="6" fill="#001b3d"/>
  <rect x="280" y="812" width="72" height="26" rx="6" fill="#1e40af"/>
  <rect x="364" y="812" width="72" height="26" rx="6" fill="#1d4ed8"/>
  <rect x="448" y="812" width="72" height="26" rx="6" fill="#2563eb"/>
  <rect x="532" y="812" width="72" height="26" rx="6" fill="#93c5fd"/>
  <rect x="616" y="812" width="72" height="26" rx="6" fill="#eff6ff" stroke="#dbeafe"/>
  <rect x="720" y="812" width="72" height="26" rx="6" fill="#0f172a"/>
  <rect x="804" y="812" width="72" height="26" rx="6" fill="#64748b"/>
  <rect x="888" y="812" width="72" height="26" rx="6" fill="#94a3b8"/>
  <rect x="972" y="812" width="72" height="26" rx="6" fill="#e2e8f0"/>
  <rect x="1056" y="812" width="72" height="26" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
  <text class="small" x="1160" y="832">Do not add new blue hex values directly.</text>
</svg>
